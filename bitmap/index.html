<!doctype html>
<html lang="en">
  <head>
    <title>three.js webgl - bitmap</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, user-scalable=no, minimum-scale=1.0, maximum-scale=1.0" />
    <style>
      body {
        margin: 0;
      }
    </style>
  </head>

  <body>
    <div id="container"></div>

    <script type="importmap">
      {
        "imports": {
          "three": "https://unpkg.com/three@0.155.0/build/three.module.js",
          "three/addons/": "https://unpkg.com/three@0.155.0/examples/jsm/"
        }
      }
    </script>

    <script type="module">
      import * as THREE from "three"
      import { OrbitControls } from "three/addons/controls/OrbitControls.js"

      const scene = new THREE.Scene()
      const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000)
      const renderer = new THREE.WebGLRenderer()
      const controls = new OrbitControls(camera, renderer.domElement)

      renderer.setSize(window.innerWidth, window.innerHeight)
      document.body.appendChild(renderer.domElement)

      camera.position.set(0, 0, 100)

      function renderPixelText(fontData, text, startX, startY, scale = 1, color = "#000000") {
        const data = []
        const textArr = [...text]
        // Monogram is a 6x12 font, but use 6 for horizontal spacing
        const charWidth = 6

        textArr.forEach((char, index) => {
          const asciiCode = char.toString()
          const rows = fontData[asciiCode]

          if (rows) {
            rows.forEach((rowVal, y) => {
              for (let x = 0; x < 8; x++) {
                // Check if bit is 'on'
                if ((rowVal >> x) & 1) {
                  // Flip Y
                  data.push({ x: startX + index * charWidth * scale + x * scale, y: -1 * (startY + y * scale) })
                }
              }
            })
          }
        })

        return data
      }

      const vertices = []

      const material = new THREE.PointsMaterial({ color: 0xffffff })

      const buffer = new THREE.BufferGeometry()

      fetch("./monogram-bitmap.json")
        .then((res) => res.json())
        .then((data) => {
          const textData = renderPixelText(data, "Hello World", 0, 0, 1, "lime")
          for (let i = 0; i < textData.length; i++) {
            const x = textData[i].x
            const y = textData[i].y
            const z = -100
            vertices.push(x, y, z)
          }
          buffer.setAttribute("position", new THREE.Float32BufferAttribute(vertices, 3))
          const points = new THREE.Points(buffer, material)

          scene.add(points)
        })

      function animate() {
        requestAnimationFrame(animate)
        renderer.render(scene, camera)
      }

      animate()

      window.addEventListener("resize", () => {
        camera.aspect = window.innerWidth / window.innerHeight
        camera.updateProjectionMatrix()
        renderer.setSize(window.innerWidth, window.innerHeight)
      })
    </script>
  </body>
</html>
